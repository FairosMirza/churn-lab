# One-click deploy blueprint for Render (https://render.com) — free tier, no Docker.
# Log in (GitHub sign-in) then open:
#   https://render.com/deploy?repo=https://github.com/FairosMirza/churn-lab
services:
  - type: web
    name: churn-lab
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/runs
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
